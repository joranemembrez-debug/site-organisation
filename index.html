<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Planning</title>
  <style>
    :root {
      --bg:      #f4f1ec;
      --surface: #ffffff;
      --text:    #1a1a1a;
      --mid:     #5c5c5c;
      --muted:   #ababab;
      --border:  #ebebeb;
      --accent:  #1a1a1a;

      --c-dog:       #5a9a5a;
      --c-sport:     #c87830;
      --c-pilates:   #b84878;
      --c-transport: #3a6ab8;
      --c-work:      #7040b8;
      --c-neutral:   #ababab;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      padding: 32px 24px 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .title {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--text);
    }

    .week-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.1px;
    }

    /* ── Day tabs ── */
    .day-tabs {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 20px 24px 0;
      -webkit-overflow-scrolling: touch;
    }
    .day-tabs::-webkit-scrollbar { display: none; }

    .day-tab {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 0 14px 18px;
      cursor: pointer;
      position: relative;
      border-bottom: 2px solid transparent;
      transition: border-color 0.15s;
      user-select: none;
    }

    .day-tab:first-child { padding-left: 0; }

    .day-tab .dn {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      transition: color 0.15s;
    }

    .day-tab .dd {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--muted);
      transition: color 0.15s, background 0.15s;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .day-tab:hover .dn,
    .day-tab:hover .dd { color: var(--text); }

    .day-tab.active .dn { color: var(--text); font-weight: 600; }
    .day-tab.active .dd {
      background: var(--text);
      color: #fff;
    }

    .day-tab.today:not(.active) .dd {
      border: 1.5px solid var(--text);
      color: var(--text);
    }

    .tl-badge {
      position: absolute;
      top: -2px;
      right: 6px;
      font-size: 0.5rem;
      font-weight: 700;
      color: #c87830;
      letter-spacing: 0.3px;
    }

    /* ── Day chips ── */
    .day-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 12px 24px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .chip {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--mid);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    /* ── Content ── */
    .content { padding: 24px 24px 0; }

    /* ── Section ── */
    .section { margin-bottom: 24px; }

    .section-name {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    /* ── Events card ── */
    .events-card {
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
    }

    /* ── Event row ── */
    .ev-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
    }

    .ev-row:last-child { border-bottom: none; }

    .ev-row:hover { background: #faf8f5; }

    .ev-row.done { opacity: 0.4; }

    .ev-row.done .ev-title { text-decoration: line-through; }

    /* time */
    .ev-time {
      font-size: 0.72rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      min-width: 82px;
      padding-top: 3px;
      line-height: 1.5;
      flex-shrink: 0;
    }

    /* colored dot */
    .ev-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .dot-dog       { background: var(--c-dog); }
    .dot-sport     { background: var(--c-sport); }
    .dot-pilates   { background: var(--c-pilates); }
    .dot-transport { background: var(--c-transport); }
    .dot-work      { background: var(--c-work); }
    .dot-neutral   { background: var(--c-neutral); }

    /* text */
    .ev-body { flex: 1; min-width: 0; }

    .ev-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
    }

    .ev-sub {
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.45;
    }

    /* check indicator */
    .ev-check {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      margin-top: 2px;
      transition: background 0.15s, border-color 0.15s;
    }

    .ev-row.done .ev-check {
      background: var(--muted);
      border-color: var(--muted);
    }
  </style>
</head>

// ── State ──────────────────────────────────────────────────────────────
let activeIdx = 0;

function getMonday() {
  const d = new Date(), dow = d.getDay();
  const m = new Date(d);
  m.setDate(d.getDate() - (dow + 6) % 7);
  m.setHours(0,0,0,0);
  return m;
}

function todayIdx() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

function dayDate(i) {
  const m = getMonday(); m.setDate(m.getDate() + i); return m;
}

function dateStr(d) { return d.toISOString().slice(0,10); }

function getDone(i) {
  try { return new Set(JSON.parse(localStorage.getItem('done_' + dateStr(dayDate(i))) || '[]')); }
  catch { return new Set(); }
}

function saveDone(i, set) {
  localStorage.setItem('done_' + dateStr(dayDate(i)), JSON.stringify([...set]));
}

function toggle(i, id) {
  const s = getDone(i);
  s.has(id) ? s.delete(id) : s.add(id);
  saveDone(i, s);
  renderContent();
}

// ── Week label ─────────────────────────────────────────────────────────
const MO = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];

function renderWeekLabel() {
  const mon = getMonday();
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  document.getElementById('weekLabel').textContent =
    `${mon.getDate()} ${MO[mon.getMonth()]} – ${sun.getDate()} ${MO[sun.getMonth()]} ${sun.getFullYear()}`;
}

// ── Tabs ───────────────────────────────────────────────────────────────
function renderTabs() {
  const today = todayIdx();
  document.getElementById('dayTabs').innerHTML = WEEK.map((d, i) => {
    const date = dayDate(i);
    const cls = [
      'day-tab',
      i === activeIdx ? 'active' : '',
      i === today ? 'today' : ''
    ].filter(Boolean).join(' ');
    return `<button class="${cls}" onclick="select(${i})">
      <span class="dn">${d.name}</span>
      <span class="dd">${date.getDate()}</span>
      ${d.tl ? '<span class="tl-badge">TL</span>' : ''}
    </button>`;
  }).join('');
}

// ── Chips ──────────────────────────────────────────────────────────────
function renderChips() {
  document.getElementById('dayChips').innerHTML =
    WEEK[activeIdx].chips.map(c => `<span class="chip">${c}</span>`).join('');
}

// ── Content ────────────────────────────────────────────────────────────
function renderContent() {
  const day  = WEEK[activeIdx];
  const done = getDone(activeIdx);
  document.getElementById('content').innerHTML = day.sections.map(sec => `
    <div class="section">
      <div class="section-name">${sec.name}</div>
      <div class="events-card">
        ${sec.events.map(ev => `
          <div class="ev-row ${done.has(ev.id) ? 'done' : ''}" onclick="toggle(${activeIdx},'${ev.id}')">
            <span class="ev-time">${ev.time}</span>
            <div class="ev-dot dot-${ev.c}"></div>
            <div class="ev-body">
              <div class="ev-title">${ev.title}</div>
              <div class="ev-sub">${ev.sub}</div>
            </div>
            <div class="ev-check"></div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function select(i) { activeIdx = i; render(); }

function render() { renderTabs(); renderChips(); renderContent(); }
