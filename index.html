<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Planning Semaine</title>
  <style>
    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --text: #1c1c1e;
      --muted: #8e8e93;
      --border: #e5e5ea;

      --dog-bg: #edf7ed; --dog-accent: #3a7d44; --dog-border: #5cb85c;
      --sport-bg: #fff5eb; --sport-accent: #d4691e; --sport-border: #ff9500;
      --pilates-bg: #fce8f3; --pilates-accent: #b5266e; --pilates-border: #e91e8c;
      --transport-bg: #e8efff; --transport-accent: #2d5be3; --transport-border: #4a7fff;
      --work-bg: #f4eeff; --work-accent: #6d28d9; --work-border: #9b59f0;
      --neutral-bg: #f5f5f7; --neutral-accent: #636366; --neutral-border: #c7c7cc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ---- Header ---- */
    .app-header {
      background: var(--bg);
      padding: 24px 20px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .app-title { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.3px; }

    .app-subtitle { font-size: 0.82rem; color: var(--muted); margin-top: 2px; margin-bottom: 16px; }

    /* ---- Day tabs ---- */
    .day-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 14px;
      -webkit-overflow-scrolling: touch;
    }
    .day-tabs::-webkit-scrollbar { display: none; }

    .day-tab {
      flex-shrink: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 9px 18px;
      border-radius: 22px;
      border: 1.5px solid var(--border);
      background: var(--card);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .day-tab:hover:not(.active) { border-color: #aaa; }

    .day-tab.active { background: var(--text); border-color: var(--text); color: #fff; }

    .day-tab .dn { font-size: 0.88rem; font-weight: 600; }

    .day-tab .dd { font-size: 0.68rem; color: var(--muted); margin-top: 1px; }

    .day-tab.active .dd { color: rgba(255,255,255,0.55); }

    .day-tab.today:not(.active) { border-color: var(--work-border); }

    .tl-badge {
      position: absolute;
      top: -7px; right: -6px;
      background: #ff9500;
      color: #fff;
      font-size: 0.55rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 8px;
      letter-spacing: 0.2px;
    }

    /* ---- Day tags ---- */
    .day-tags {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      padding: 0 20px 16px;
      background: var(--bg);
    }

    .dtag {
      font-size: 0.73rem;
      font-weight: 500;
      padding: 4px 11px;
      border-radius: 12px;
    }

    .dtag-bureau   { background: var(--transport-bg); color: var(--transport-accent); }
    .dtag-tl       { background: #fff5eb;             color: #d4691e; }
    .dtag-sport    { background: var(--sport-bg);     color: var(--sport-accent); }
    .dtag-pilates  { background: var(--pilates-bg);   color: var(--pilates-accent); }
    .dtag-repos    { background: var(--neutral-bg);   color: var(--neutral-accent); }
    .dtag-weekend  { background: var(--dog-bg);       color: var(--dog-accent); }
    .dtag-chienne  { background: var(--dog-bg);       color: var(--dog-accent); }

    /* ---- Timeline ---- */
    .timeline { padding: 0 16px; }

    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 20px 6px 8px;
    }

    .events { display: flex; flex-direction: column; gap: 8px; }

    /* ---- Event card ---- */
    .ev {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--card);
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.12s;
      border-left: 3.5px solid transparent;
      position: relative;
    }

    .ev:hover { transform: translateX(2px); }

    .ev.done { opacity: 0.45; }

    .ev.done .ev-title { text-decoration: line-through; }

    .ev-dog       { background: var(--dog-bg);       border-left-color: var(--dog-border); }
    .ev-sport     { background: var(--sport-bg);     border-left-color: var(--sport-border); }
    .ev-pilates   { background: var(--pilates-bg);   border-left-color: var(--pilates-border); }
    .ev-transport { background: var(--transport-bg); border-left-color: var(--transport-border); }
    .ev-work      { background: var(--work-bg);      border-left-color: var(--work-border); }
    .ev-neutral   { background: var(--neutral-bg);   border-left-color: var(--neutral-border); }

    .ev-time {
      font-size: 0.75rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      min-width: 96px;
      line-height: 1.7;
      flex-shrink: 0;
    }

    .ev-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }

    .ev-body { flex: 1; min-width: 0; }

    .ev-title { font-size: 0.9rem; font-weight: 600; line-height: 1.35; }

    .ev-sub {
      font-size: 0.78rem;
      margin-top: 3px;
      line-height: 1.4;
    }

    .ev-dog .ev-sub       { color: var(--dog-accent); }
    .ev-sport .ev-sub     { color: var(--sport-accent); }
    .ev-pilates .ev-sub   { color: var(--pilates-accent); }
    .ev-transport .ev-sub { color: var(--transport-accent); }
    .ev-work .ev-sub      { color: var(--work-accent); }
    .ev-neutral .ev-sub   { color: var(--neutral-accent); }

    .ev-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      margin-top: 6px;
      transition: background 0.15s, border-color 0.15s;
    }

    .ev.done .ev-dot { background: var(--muted); border-color: var(--muted); }
  </style>
</head>

// ---- State ----
let activeIdx = 0;
const doneKey = d => 'done_' + d;

function getDone(dayIdx) {
  const today = getMonday();
  today.setDate(today.getDate() + dayIdx);
  const key = doneKey(today.toISOString().slice(0,10));
  try { return new Set(JSON.parse(localStorage.getItem(key) || '[]')); }
  catch { return new Set(); }
}

function saveDone(dayIdx, set) {
  const today = getMonday();
  today.setDate(today.getDate() + dayIdx);
  const key = doneKey(today.toISOString().slice(0,10));
  localStorage.setItem(key, JSON.stringify([...set]));
}

function toggleDone(dayIdx, evId) {
  const set = getDone(dayIdx);
  set.has(evId) ? set.delete(evId) : set.add(evId);
  saveDone(dayIdx, set);
  renderTimeline();
}

// ---- Week helpers ----
function getMonday() {
  const d = new Date();
  const dow = d.getDay();
  const diff = (dow + 6) % 7;
  const mon = new Date(d);
  mon.setDate(d.getDate() - diff);
  mon.setHours(0,0,0,0);
  return mon;
}

function getTodayIdx() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

const MONTHS_SHORT = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];

// ---- Render week label ----
function renderWeekLabel() {
  const mon = getMonday();
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  document.getElementById('weekLabel').textContent =
    `Semaine du ${mon.getDate()} ${MONTHS_SHORT[mon.getMonth()]} au ${sun.getDate()} ${MONTHS_SHORT[sun.getMonth()]} ${sun.getFullYear()}`;
}

// ---- Render tabs ----
function renderTabs() {
  const mon = getMonday();
  const todayIdx = getTodayIdx();
  const container = document.getElementById('dayTabs');
  container.innerHTML = '';

  WEEK.forEach((day, i) => {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    const btn = document.createElement('button');
    btn.className = 'day-tab' +
      (i === activeIdx ? ' active' : '') +
      (i === todayIdx ? ' today' : '');

    btn.innerHTML = `<span class="dn">${day.name}</span><span class="dd">${d.getDate()}</span>` +
      (day.tl ? `<span class="tl-badge">TL</span>` : '');

    btn.addEventListener('click', () => { activeIdx = i; render(); });
    container.appendChild(btn);
  });
}

// ---- Render tags ----
function renderTags() {
  const day = WEEK[activeIdx];
  const container = document.getElementById('dayTags');
  container.innerHTML = day.tags.map(t =>
    `<span class="dtag ${t.cls}">${t.label}</span>`
  ).join('');
}

// ---- Render timeline ----
function renderTimeline() {
  const day = WEEK[activeIdx];
  const done = getDone(activeIdx);
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  day.sections.forEach(sec => {
    if (!sec.events.length) return;

    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = sec.name;
    tl.appendChild(lbl);

    const eventsDiv = document.createElement('div');
    eventsDiv.className = 'events';

    sec.events.forEach(ev => {
      const isDone = done.has(ev.id);
      const card = document.createElement('div');
      card.className = `ev ev-${ev.c}${isDone ? ' done' : ''}`;
      card.innerHTML = `
        <span class="ev-time">${ev.time}</span>
        <span class="ev-icon">${ev.icon}</span>
        <div class="ev-body">
          <div class="ev-title">${ev.title}</div>
          <div class="ev-sub">${ev.sub}</div>
        </div>
        <div class="ev-dot"></div>
      `;
      card.addEventListener('click', () => toggleDone(activeIdx, ev.id));
      eventsDiv.appendChild(card);
    });

    tl.appendChild(eventsDiv);
  });
}

// ---- Init ----
function render() {
  renderTabs();
  renderTags();
  renderTimeline();
}

activeIdx = getTodayIdx();
renderWeekLabel();
render();
</script>
</body>
</html>
